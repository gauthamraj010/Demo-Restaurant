<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Details - Demo Resort</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --primary-blue: #2563eb;
            --success-green: #10b981;
            --occupied-red: #ef4444;
            --warning-orange: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: start; min-height: 100vh; padding: 20px; }

        .web-app-container {
            width: 100%; max-width: 480px; background: #fcfcfd; min-height: 85vh;
            border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border-color);
        }

        .header { padding: 20px 20px 10px 20px; display: flex; align-items: center; background: #fff; }
        .logo-badge { background-color: #0f172a; color: white; font-weight: 800; padding: 6px 10px; border-radius: 6px; font-size: 14px; margin-right: 12px; }
        .app-title { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: #000; }

        .nav-tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border-color); }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; font-size: 11px; font-weight: 600; color: var(--text-muted); text-decoration: none; cursor: pointer; text-align: center; }
        .tab-item.active { color: var(--primary-blue); border-bottom: 3px solid var(--primary-blue); background: #f8fafc; }
        .tab-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: none; stroke: currentColor; stroke-width: 2; }

        .page-title-bar { padding: 14px 20px; display: flex; align-items: center; background: #fff; border-bottom: 1px solid var(--border-color); }
        .back-btn { background: none; border: none; cursor: pointer; margin-right: 12px; display: flex; align-items: center; }
        .page-heading { font-size: 16px; font-weight: 700; text-transform: uppercase; }

        .rooms-grid { padding: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .room-card { background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 12px; padding: 18px 8px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.02); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 110px; }
        .room-number { font-size: 20px; font-weight: 800; margin-bottom: 4px; color: #000; }
        .room-guest-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; padding: 0 4px; }

        .room-status { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px; text-align: center; justify-content: center; max-width: 100%; }
        
        .spinner { border: 2px solid rgba(0, 0, 0, 0.1); border-top: 2px solid var(--primary-blue); border-radius: 50%; width: 12px; height: 12px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .status-loading { background: #f3f4f6; color: var(--text-muted); }
        .status-available { background: #e0f2fe; color: var(--primary-blue); }
        .status-reserved { background: #fef3c7; color: var(--warning-orange); }
        .status-stayback { background: #fee2e2; color: var(--occupied-red); }
        .status-checkout-pending { background: #ffedd5; color: #ea580c; border: 1px dashed #ea580c; }

        .modal-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px rgba(0,0,0,0.15); max-height: 90vh; overflow-y: auto; }
        .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; text-transform: uppercase; }
        .guest-details-box { background: #f8fafc; padding: 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; line-height: 1.6; border: 1px solid var(--border-color); }
        
        .action-grid-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
        .action-btn { width: 100%; padding: 12px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; border: none; text-transform: uppercase; display: inline-block; text-align: center; }
        .btn-checkin { background: var(--success-green); color: white; }
        .btn-walkin { background: var(--primary-blue); color: white; }
        .btn-cancel { background: #e5e7eb; color: var(--text-main); }
        .btn-add-bill { background: #3498db; color: white; }
        .btn-edit-bill { background: #ea580c; color: white; }
        
        .modal label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; font-weight: 700; text-transform: uppercase; }
        .modal input, .modal select { width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; font-weight: 600; }
        .pax-row { display: flex; gap: 10px; }
        .pax-row > div { flex: 1; }
        .bill-item-row { display: flex; justify-content: space-between; font-size: 13px; color: #4b5563; padding: 4px 0; border-bottom: 1px dashed #e5e7eb; }
        
        .payment-option-card { border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; font-weight: 700; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .payment-option-card:hover { background: #f8fafc; border-color: var(--primary-blue); }
    </style>
</head>
<body>

    <div class="web-app-container">
        <header class="header">
            <div class="logo-badge">DR</div>
            <h1 class="app-title">Demo Resort</h1>
        </header>

        <nav class="nav-tabs">
            <div class="tab-item active" onclick="window.location.href='index.html'">
                <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </div>
            <div class="tab-item" onclick="window.location.href='addbill.html'">
                <svg viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                New bill
            </div>
            <div class="tab-item" onclick="window.location.href='pendingorder.html'">
                <svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Pending Orders
            </div>
            <div class="tab-item">
                <svg viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Account
            </div>
        </nav>

        <div class="page-title-bar">
            <button class="back-btn" onclick="window.location.href='index.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <h2 class="page-heading">Room Details</h2>
        </div>

        <div class="rooms-grid" id="roomsContainer"></div>
    </div>

    <div id="roomModalBg" class="modal-bg" style="display: none;">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        const todayStr = new Date().toLocaleDateString('sv'); 
        const customRoomsList = ["A-1", "Twin-1", "Twin-2", "Paddy", "P-1", "P-2", "Delux"];
        let roomsState = {}; 

        const firebaseConfig = {
            apiKey: "AIzaSyCebk_0DBBu5w0cvWP0lUKqQanmiwoC42U",
            authDomain: "booking-25ba4.firebaseapp.com",
            projectId: "booking-25ba4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function preloadRoomsLayout() {
            const container = document.getElementById('roomsContainer');
            container.innerHTML = '';
            customRoomsList.forEach(roomName => {
                roomsState[roomName] = { status: 'Loading', data: null, docId: null };
                container.innerHTML += `
                    <div class="room-card" id="card-${roomName}" onclick="handleRoomClick('${roomName}')">
                        <div class="room-number">${roomName}</div>
                        <div class="room-guest-label" id="guest-${roomName}">Please wait...</div>
                        <div class="room-status status-loading" id="status-${roomName}">
                            <div class="spinner"></div> Checking...
                        </div>
                    </div>
                `;
            });
            fetchAllRoomsParallel();
        }

        function fetchAllRoomsParallel() {
            const roomPromises = customRoomsList.map(roomName => checkSingleRoomStatus(roomName));
            Promise.all(roomPromises).catch(err => console.error("Parallel lookup load error:", err));
        }

        async function checkSingleRoomStatus(roomName) {
            try {
                let activeSnap = await db.collection('bookings')
                                         .where('roomNo', '==', roomName)
                                         .where('checkedIn', '==', true).get();

                if (!activeSnap.empty) {
                    let stayData = activeSnap.docs[0].data();
                    let docId = activeSnap.docs[0].id;
                    
                    if (stayData.checkout === todayStr) {
                        updateRoomUIState(roomName, 'CheckoutPending', stayData, docId);
                    } else {
                        updateRoomUIState(roomName, 'StayBack', stayData, docId);
                    }
                    return; 
                }

                let reservedSnap = await db.collection('bookings')
                                           .where('roomNo', '==', roomName)
                                           .where('checkin', '==', todayStr)
                                           .get();

                let freshReservation = reservedSnap.docs.find(d => d.data().checkedIn !== 'Completed' && d.data().checkedIn !== true);

                if (freshReservation) {
                    updateRoomUIState(roomName, 'Reserved', freshReservation.data(), freshReservation.id);
                } else {
                    updateRoomUIState(roomName, 'Available', null, null);
                }
            } catch (error) {
                console.error(error);
                updateRoomUIState(roomName, 'Available', null, null);
            }
        }

        function updateRoomUIState(roomName, status, data, docId) {
            roomsState[roomName] = { status: status, data: data, docId: docId };
            const badge = document.getElementById(`status-${roomName}`);
            const guestLabel = document.getElementById(`guest-${roomName}`);
            if (!badge || !guestLabel) return;
            
            badge.className = 'room-status'; 
            if (status === 'StayBack') {
                badge.classList.add('status-stayback');
                badge.innerHTML = 'Arrived';
                guestLabel.innerText = data.name || "No Name";
            } else if (status === 'CheckoutPending') {
                badge.classList.add('status-checkout-pending');
                badge.innerHTML = '⚠️ Checkout';
                guestLabel.innerText = data.name || "No Name";
            } else if (status === 'Reserved') {
                badge.classList.add('status-reserved');
                badge.innerHTML = 'Pre-Booked';
                guestLabel.innerText = data.name || "No Name";
            } else {
                badge.classList.add('status-available');
                badge.innerHTML = 'Available';
                guestLabel.innerText = "Empty";
            }
        }

        function handleRoomClick(roomName) {
            const room = roomsState[roomName];
            if (room.status === 'Loading') return;

            const modalBg = document.getElementById('roomModalBg');
            const modalContent = document.getElementById('modalContent');
            modalBg.style.display = 'flex';

            if (room.status === 'StayBack' || room.status === 'CheckoutPending') {
                let additionalChargesTotal = 0;
                let additionalBillsHTML = "";
                
                if (room.data.extraBills && Array.isArray(room.data.extraBills)) {
                    room.data.extraBills.forEach(bill => {
                        additionalChargesTotal += parseFloat(bill.amount) || 0;
                        let inlineDesc = bill.particular.replace(/\n/g, ", ");
                        additionalBillsHTML += `
                            <div class="bill-item-row">
                                <span>📌 ${bill.billType}: ${inlineDesc}</span>
                                <b>₹${bill.amount}</b>
                            </div>`;
                    });
                }

                let baseRoomRent = parseFloat(room.data.total) || 0;
                let advancePaid = parseFloat(room.data.advance) || 0;
                let finalPendingBalance = (baseRoomRent - advancePaid) + additionalChargesTotal;

                modalContent.innerHTML = `
                    <div class="modal-title">Operational Hub (${roomName})</div>
                    <div class="guest-details-box">
                        <b>Guest Name:</b> ${room.data.name}<br>
                        <b>Phone:</b> ${room.data.phone}<br>
                        <b>Stay Span:</b> ${room.data.checkin} › ${room.data.checkout}<br>
                        <b>Pax Total:</b> Adults: ${room.data.adults || 0} | Kids: ${room.data.kids || 0}<br>
                        <hr style="margin: 8px 0; border: 0; border-top: 1px solid var(--border-color);">
                        <b>Room Base Rent:</b> ₹${baseRoomRent}<br>
                        <b>Advance Provided:</b> ₹${advancePaid}<br>
                        
                        ${additionalChargesTotal > 0 ? `
                            <hr style="margin: 8px 0; border: 0; border-top: 1px solid var(--border-color);">
                            <div style="font-weight: 700; color: var(--primary-blue); margin-bottom: 4px;">Accumulated Room Charges:</div>
                            ${additionalBillsHTML}
                            <div style="text-align: right; margin-top: 4px; font-weight: 700;">Extra Charge Total: ₹${additionalChargesTotal}</div>
                        ` : ''}
                        
                        <hr style="margin: 8px 0; border: 0; border-top: 1px solid var(--border-color);">
                        <span style="font-size: 16px; color: var(--occupied-red); font-weight: 800;">
                            Pending Balance: ₹${finalPendingBalance}
                        </span>
                    </div>

                    <div class="action-grid-buttons">
                        <button class="action-btn btn-add-bill" onclick="window.location.href='addbill.html'">➕ Add Bill</button>
                        <button class="action-btn btn-edit-bill" onclick="triggerExtraBillsReset('${room.docId}', '${roomName}')">📝 Edit Bills</button>
                    </div>

                    <button class="action-btn btn-checkin" onclick="openPaymentSelectionWindow('${room.docId}', ${finalPendingBalance})">Settle Balance & Check-Out</button>
                    <button class="action-btn btn-cancel" style="margin-top:8px;" onclick="closeModal()">Close</button>
                `;
            } else if (room.status === 'Reserved') {
                modalContent.innerHTML = `
                    <div class="modal-title">Pre-Booked Arrival (${roomName})</div>
                    <div class="guest-details-box">
                        <b>Guest Name:</b> ${room.data.name}<br>
                        <b>Phone:</b> ${room.data.phone}<br>
                        <b>Total:</b> ₹${room.data.total || 0}<br>
                        <b>Advance Paid:</b> ₹${room.data.advance || 0}<br>
                        <b>Pax Details:</b> Adults: ${room.data.adults || 0}, Kids: ${room.data.kids || 0}
                    </div>
                    <button class="action-btn btn-checkin" onclick="processCheckIn('${room.docId}')">Confirm Check-In</button>
                    <button class="action-btn btn-cancel" onclick="closeModal()">Close</button>
                `;
            } else {
                modalContent.innerHTML = `
                    <div class="modal-title">Walk-In Registration (${roomName})</div>
                    
                    <label>Guest Name *</label>
                    <input type="text" id="walkInName" placeholder="Enter guest full name">
                    
                    <label>Phone Number *</label>
                    <input type="tel" id="walkInPhone" placeholder="10-digit mobile number" maxlength="10">
                    
                    <label>Total Amount *</label>
                    <input type="number" id="walkInTotal" placeholder="₹ Total base charges">
                    
                    <label>Advance Paid *</label>
                    <input type="number" id="walkInAdvance" placeholder="₹ Paid advance amount">
                    
                    <div class="pax-row">
                        <div>
                            <label>No. of Pax [Adults] *</label>
                            <input type="number" id="walkInAdults" placeholder="0" min="1">
                        </div>
                        <div>
                            <label>No. of Pax [Kids] *</label>
                            <input type="number" id="walkInKids" placeholder="0" min="0">
                        </div>
                    </div>
                    
                    <label>Check-Out Target Date *</label>
                    <input type="date" id="walkInCheckoutDate">
                    
                    <button class="action-btn btn-walkin" onclick="saveWalkInAndCheckIn('${roomName}')">Save & Check-In</button>
                    <button class="action-btn btn-cancel" onclick="closeModal()">Cancel</button>
                `;
            }
        }

        function triggerExtraBillsReset(docId, roomNo) {
            if (confirm(`Do you want to clear/reset all added extra food & service bills linked to Room ${roomNo}?`)) {
                db.collection('bookings').doc(docId).update({
                    extraBills: []
                }).then(() => {
                    alert("Room ledger bills reset safely.");
                    closeModal();
                    preloadRoomsLayout();
                }).catch(err => alert("Error updating sheet: " + err.message));
            }
        }

        function openPaymentSelectionWindow(docId, pendingAmt) {
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-title">Select Payment Mode</div>
                <div style="background:#f0fdf4; border:1px solid #bbf7d0; padding:12px; border-radius:8px; margin-bottom:14px; font-weight:700; font-size:14px; color:#166534; text-align:center;">
                    Collected Settle Amount: ₹${pendingAmt}
                </div>
                
                <div class="payment-option-card" onclick="commitFinalizedCheckout('${docId}', 'Cash')">
                    <span>💵 Cash Payment</span> ➡️
                </div>
                <div class="payment-option-card" onclick="commitFinalizedCheckout('${docId}', 'UPI / QR Scan')">
                    <span>📱 UPI / Online Transfer</span> ➡️
                </div>
                <div class="payment-option-card" onclick="commitFinalizedCheckout('${docId}', 'Card')">
                    <span>💳 Credit/Debit Card</span> ➡️
                </div>
                <div class="payment-option-card" onclick="commitFinalizedCheckout('${docId}', 'Split Settlement')">
                    <span>⚖️ Split/Multi-mode Payment</span> ➡️
                </div>

                <button class="action-btn btn-cancel" style="margin-top:14px;" onclick="preloadRoomsLayout()">🔙 Back</button>
            `;
        }

        async function commitFinalizedCheckout(docId, selectedMode) {
            try {
                await db.collection('bookings').doc(docId).update({
                    checkedIn: "Completed",
                    paymentMode: selectedMode,
                    checkoutSettledTimestamp: new Date().toISOString()
                });
                
                alert(`Checked out successfully! Settle Option logged: [${selectedMode}]`);
                closeModal();
                preloadRoomsLayout();
            } catch (err) {
                alert("Checkout submission process fault error: " + err.message);
            }
        }

        function processCheckIn(docId) {
            db.collection('bookings').doc(docId).update({
                checkedIn: true
            }).then(() => {
                closeModal();
                preloadRoomsLayout();
            }).catch(err => alert("Error updating check-in: " + err));
        }

        function saveWalkInAndCheckIn(roomName) {
            const name = document.getElementById('walkInName').value.trim();
            const phone = document.getElementById('walkInPhone').value.trim();
            const totalInput = document.getElementById('walkInTotal').value;
            const advanceInput = document.getElementById('walkInAdvance').value;
            const adultsInput = document.getElementById('walkInAdults').value;
            const kidsInput = document.getElementById('walkInKids').value;
            const checkoutDate = document.getElementById('walkInCheckoutDate').value;

            // Validations (Image 305 requirements)
            if (!name) { alert("Guest Name is mandatory."); return; }
            
            const phoneRegex = /^\d{10}$/;
            if (!phone || !phoneRegex.test(phone)) { alert("Phone Number is mandatory and must be exactly 10 digits."); return; }
            
            if (totalInput === "") { alert("Total Amount is mandatory."); return; }
            const total = parseFloat(totalInput) || 0;
            
            if (advanceInput === "") { alert("Advance Paid is mandatory."); return; }
            const advance = parseFloat(advanceInput) || 0;
            
            if (advance > total) { alert("Warning: Advance paid cannot be more than the total amount!"); return; }
            
            if (adultsInput === "") { alert("No. of Adult Pax is mandatory."); return; }
            if (kidsInput === "") { alert("No. of Kid Pax is mandatory."); return; }
            if (!checkoutDate) { alert("Checkout Target Date is mandatory."); return; }

            db.collection('bookings').add({
                roomNo: roomName,
                name: name,
                phone: phone,
                total: total,
                advance: advance,
                adults: parseInt(adultsInput) || 0,
                kids: parseInt(kidsInput) || 0,
                checkin: todayStr,
                checkout: checkoutDate,
                checkedIn: true,
                createdBy: 'staff',
                extraBills: []
            }).then(() => {
                closeModal();
                preloadRoomsLayout();
            }).catch(err => alert("Error saving walk-in: " + err));
        }

        function closeModal() { document.getElementById('roomModalBg').style.display = 'none'; }
        window.onload = preloadRoomsLayout;
    </script>
</body>
</html>
