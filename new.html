<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Booking - Demo Resort</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --primary-blue: #2563eb;
            --error-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: start;
            min-height: 100vh;
            padding: 20px;
        }

        .web-app-container {
            width: 100%;
            max-width: 480px;
            background: #fcfcfd;
            min-height: 85vh;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
            padding: 20px;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            color: #000;
        }

        .back-btn {
            text-decoration: none;
            color: var(--primary-blue);
            font-weight: 700;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary-blue);
        }

        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .submit-btn {
            width: 100%;
            background: #000;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--primary-blue);
        }

        /* Custom Modal System */
        .modal-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); width: 90%; max-width: 360px; }
        .modal-title { margin-bottom: 12px; font-weight: bold; font-size: 18px; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .modal-btn { background: var(--primary-blue); color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; float: right; }
    </style>
</head>
<body>

    <div class="web-app-container">
        <div class="header-row">
            <h1 class="app-title">New Booking</h1>
            <a href="index.html" class="back-btn">← Dashboard</a>
        </div>

        <form id="bookingForm" onsubmit="event.preventDefault(); saveUpcomingBooking();">
            <div class="form-group">
                <label for="guestName">Guest Name</label>
                <input type="text" id="guestName" required placeholder="Enter guest full name">
            </div>

            <div class="form-group">
                <label for="guestPhone">Phone Number</label>
                <input type="tel" id="guestPhone" required placeholder="Enter 10-digit phone number">
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="roomNo">Room No</label>
                    <select id="roomNo" required>
                        <option value="A-1">A-1</option>
                        <option value="Twin-1">Twin-1</option>
                        <option value="Twin-2">Twin-2</option>
                        <option value="Paddy">Paddy</option>
                        <option value="P-1">P-1</option>
                        <option value="P-2">P-2</option>
                        <option value="Delux">Delux</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="checkinDate">Check-in Date</label>
                    <input type="date" id="checkinDate" required>
                </div>
            </div>

            <div class="form-group">
                <label for="checkoutDate">Check-out Target Date</label>
                <input type="date" id="checkoutDate" required>
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="adults">Adults Pax</label>
                    <input type="number" id="adults" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label for="kids">Kids Pax</label>
                    <input type="number" id="kids" min="0" value="0" required>
                </div>
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="totalAmount">Total Rent (₹)</label>
                    <input type="number" id="totalAmount" min="0" required placeholder="0">
                </div>
                <div class="form-group">
                    <label for="advanceAmount">Advance Paid (₹)</label>
                    <input type="number" id="advanceAmount" min="0" value="0" required placeholder="0">
                </div>
            </div>

            <button type="submit" class="submit-btn">Save Booking</button>
        </form>
    </div>

    <div id="alertModalBg" class="modal-bg" style="display:none;">
        <div class="modal">
            <div class="modal-title" id="modalTitle">Notice</div>
            <div id="modalText" style="font-size:14px; line-height:1.5; margin-bottom:15px; color: var(--text-main);"></div>
            <button class="modal-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script>
        // Initialize Firebase Connection details matching project criteria
        const firebaseConfig = {
            apiKey: "AIzaSyCebk_0DBBu5w0cvWP0lUKqQanmiwoC42U",
            authDomain: "booking-25ba4.firebaseapp.com",
            projectId: "booking-25ba4",
            storageBucket: "booking-25ba4.firebasestorage.app",
            messagingSenderId: "924758316703",
            appId: "1:924758316703:web:6cee8188781143ae1774aa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Custom alert display helpers
        function showAlert(message, title = "Validation Warning") {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = message;
            document.getElementById('alertModalBg').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('alertModalBg').style.display = 'none';
        }

        // Point 1: Handle pre-selection of Room and Check-in parameters sent via URL parameters
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            const dateParam = urlParams.get('date');

            if (roomParam) {
                document.getElementById('roomNo').value = roomParam;
            }
            if (dateParam) {
                document.getElementById('checkinDate').value = dateParam;
            }
        });

        // Point 2 & 3: Field verification logic and data synchronization layout
        function saveUpcomingBooking() {
            const name = document.getElementById('guestName').value.trim();
            const phone = document.getElementById('guestPhone').value.trim();
            const roomName = document.getElementById('roomNo').value;
            const checkin = document.getElementById('checkinDate').value;
            const checkout = document.getElementById('checkoutDate').value;
            const adults = parseInt(document.getElementById('adults').value) || 0;
            const kids = parseInt(document.getElementById('kids').value) || 0;
            const total = parseFloat(document.getElementById('totalAmount').value) || 0;
            const advance = parseFloat(document.getElementById('advanceAmount').value) || 0;

            // Validation Rule 1: 10 Digit Phone checking
            if (phone.length !== 10 || isNaN(phone)) {
                showAlert("Please enter a valid 10 digit mobile number.", "Invalid Phone Input");
                return;
            }

            // Validation Rule 2: Advance vs Total cap evaluation 
            if (advance > total) {
                showAlert("Warning: Advance paid cannot be more than the total rent amount!", "Financial Rule Error");
                return;
            }

            // Verification Rule 3: Sequential timing range checking
            if (checkout < checkin) {
                showAlert("Error: Check-out target date cannot fall before your select Check-in date.", "Timeline Error");
                return;
            }

            // Point 3: Commit structural schema values matching room_details ledger configuration accurately
            db.collection('bookings').add({
                roomNo: roomName, // Matches lookup string layout references perfectly 
                name: name,
                phone: phone,
                total: total,
                advance: advance,
                adults: adults,
                kids: kids,
                checkin: checkin,   // Preselected setup key parameter tracking
                checkout: checkout,
                checkedIn: "Upcoming", // Retains item parameters for active workspace view processing without instant walk-in conversion
                createdBy: 'owner',
                extraBills: []
            })
            .then(() => {
                showAlert("Booking details saved successfully to system workspace upcoming lists!", "Success");
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1500);
            })
            .catch(err => {
                showAlert("Error connecting to database ledger line: " + err.message, "System Write Failure");
            });
        }
    </script>
</body>
</html>
