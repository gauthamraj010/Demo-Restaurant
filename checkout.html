<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Checkout - Demo Resort</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-main: #111827;
            --border-color: #e5e7eb;
            --primary-blue: #2563eb;
            --success-green: #10b981;
            --text-muted: #6b7280;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: start; min-height: 100vh; padding: 20px; }
        
        .web-app-container {
            width: 100%; max-width: 480px; background: #fff; min-height: 85vh;
            border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; overflow: hidden;
        }
        
        /* Fixed App Header UI Blueprint */
        .header { padding: 20px 20px 10px 20px; display: flex; align-items: center; background: #fff; }
        .logo-badge { background-color: #0f172a; color: white; font-weight: 800; padding: 6px 10px; border-radius: 6px; font-size: 14px; margin-right: 12px; }
        .app-title { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: #000; }

        /* Navigation Menu Tab Strip */
        .nav-tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border-color); }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; font-size: 13px; font-weight: 600; color: var(--text-muted); text-decoration: none; cursor: pointer; }
        .tab-item:hover { color: var(--primary-blue); }
        .tab-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* Page Back Title Bar Header Block */
        .page-title-bar { padding: 14px 20px; display: flex; align-items: center; background: #fff; border-bottom: 1px solid var(--border-color); }
        .back-btn { background: none; border: none; cursor: pointer; margin-right: 12px; display: flex; align-items: center; }
        .page-heading { font-size: 16px; font-weight: 700; text-transform: uppercase; }
        
        #loadingMessage { font-size: 14px; color: var(--text-muted); text-align: center; margin: 40px 0; }
        
        /* Card Display Context Layout */
        .content-body { padding: 20px; }
        .detail-card { background: #f8fafc; border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 20px; line-height: 1.8; }
        .highlight-balance { font-size: 18px; font-weight: 800; color: #ea580c; margin-top: 8px; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        .form-select { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; background-color: #fff; font-weight: 600; }
        
        .action-btn { width: 100%; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 15px; cursor: pointer; border: none; text-align: center; color: white; background: var(--success-green); }
    </style>
</head>
<body>

    <div class="web-app-container">
        <header class="header">
            <div class="logo-badge">DR</div>
            <h1 class="app-title">Demo Resort</h1>
        </header>

        <nav class="nav-tabs">
            <div class="tab-item" onclick="window.location.href='index.html'">
                <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </div>
            <div class="tab-item" onclick="window.location.href='addbill.html'">
                <svg viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                New bill
            </div>
            <div class="tab-item" onclick="window.location.href='viewbill.html'">
                <svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                View bill
            </div>
            <div class="tab-item">
                <svg viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Account
            </div>
        </nav>

        <div class="page-title-bar">
            <button class="back-btn" onclick="window.location.href='room_details.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <h2 class="page-heading">Room Checkout</h2>
        </div>

        <div id="loadingMessage">Loading active stay files...</div>
        
        <div id="checkoutContent" class="content-body" style="display:none;">
            <div class="detail-card">
                <h3 id="roomTitle" style="margin-bottom:12px; font-size: 22px; font-weight: 800;">Room: </h3>
                <p><b>Guest Name:</b> <span id="gName"></span></p>
                <p><b>Phone:</b> <span id="gPhone"></span></p>
                <p><b>Check-In Date:</b> <span id="gCheckin"></span></p>
                <p><b>Check-Out Date:</b> <span id="gCheckout"></span></p>
                <hr style="margin:12px 0; border:0; border-top:1px solid var(--border-color);">
                <p><b>Total Amount:</b> ₹<span id="gTotal"></span></p>
                <p><b>Advance Paid:</b> ₹<span id="gAdvance"></span></p>
                <div class="highlight-balance">Pending Balance: ₹<span id="gBalance"></span></div>
            </div>

            <div class="form-group">
                <label>Settle Payment Mode</label>
                <select id="paymentMode" class="form-select">
                    <option value="UPI">UPI / QR Scan</option>
                    <option value="Cash">Cash</option>
                    <option value="Card">Card Payment</option>
                </select>
            </div>

            <button class="action-btn" onclick="confirmAndProcessCheckout()">Settle Balance & Send Bill</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomNo = urlParams.get('room');
        const stayId = urlParams.get('stayId'); 

        const firebaseConfig = {
            apiKey: "AIzaSyCebk_0DBBu5w0cvWP0lUKqQanmiwoC42U",
            authDomain: "booking-25ba4.firebaseapp.com",
            projectId: "booking-25ba4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let globalStayData = null;
        let calculatedBalance = 0;
        const todayStr = new Date().toLocaleDateString('sv'); 

        async function loadStayDetails() {
            if (!stayId) {
                document.getElementById('loadingMessage').innerText = "Error: Invalid link pointer parameters.";
                return;
            }
            try {
                let doc = await db.collection('bookings').doc(stayId).get();
                if (!doc.exists) {
                    document.getElementById('loadingMessage').innerText = "Stay profile already cleared or removed.";
                    return;
                }
                
                globalStayData = doc.data();
                calculatedBalance = parseFloat(globalStayData.total || 0) - parseFloat(globalStayData.advance || 0);

                document.getElementById('roomTitle').innerText = `Room: ${globalStayData.roomNo}`;
                document.getElementById('gName').innerText = globalStayData.name;
                document.getElementById('gPhone').innerText = globalStayData.phone;
                document.getElementById('gCheckin').innerText = globalStayData.checkin;
                document.getElementById('gCheckout').innerText = globalStayData.checkout || 'Not Specified';
                document.getElementById('gTotal').innerText = globalStayData.total;
                document.getElementById('gAdvance').innerText = globalStayData.advance || 0;
                document.getElementById('gBalance').innerText = calculatedBalance;

                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('checkoutContent').style.display = 'block';
            } catch(e) {
                console.error(e);
                document.getElementById('loadingMessage').innerText = "Network database parsing error.";
            }
        }

        async function confirmAndProcessCheckout() {
            if (!confirm(`Confirm receipt of ₹${calculatedBalance} and execute room checkout?`)) return;

            const selectedMode = document.getElementById('paymentMode').value;

            try {
                // 1. Mark booking lifecycle as completed inside 'bookings'
                await db.collection('bookings').doc(stayId).update({
                    checkedIn: 'Completed'
                });

                // 2. Automatically write record to your 'transactions' balance tracking ledger
                await db.collection('transactions').add({
                    bookingId: stayId,
                    roomNo: globalStayData.roomNo,
                    guestName: globalStayData.name,
                    date: todayStr,
                    type: "Settle",
                    amountPaid: calculatedBalance,
                    paymentMode: selectedMode,
                    recordedBy: "owner"
                });

                // 3. Create the text receipt payload
                const receiptMessage = `*VINTAGE GARDEN RESORT*\n` +
                                       `-----------------------------\n` +
                                       `*Room No:* ${globalStayData.roomNo}\n` +
                                       `*Guest:* ${globalStayData.name}\n` +
                                       `*Check-In:* ${globalStayData.checkin}\n` +
                                       `*Check-Out:* ${todayStr}\n` +
                                       `-----------------------------\n` +
                                       `Total Amount: ₹${globalStayData.total}\n` +
                                       `Advance Paid: ₹${globalStayData.advance || 0}\n` +
                                       `*Balance Paid:* ₹${calculatedBalance}\n` +
                                       `*Payment Mode:* ${selectedMode}\n\n` +
                                       `Status: *Paid & Settled* ✅\n\n` +
                                       `Thank you for staying with us! ✨`;

                // 4. Fire Native Share pop-up sheet (WhatsApp/Email)
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: 'Vintage Garden Resort Invoice',
                            text: receiptMessage
                        });
                        window.location.href = 'room_details.html';
                    } catch(err) {
                        window.location.href = 'room_details.html';
                    }
                } else {
                    window.open(`https://api.whatsapp.com/send?phone=${globalStayData.phone}&text=${encodeURIComponent(receiptMessage)}`, '_blank');
                    window.location.href = 'room_details.html';
                }

            } catch (err) {
                alert("Error recording checkout data: " + err.message);
            }
        }

        window.onload = loadStayDetails;
    </script>
</body>
</html>
