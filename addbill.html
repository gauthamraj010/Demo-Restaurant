<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Bill - Demo Resort</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-main: #111827;
            --border-color: #e5e7eb;
            --primary-blue: #2563eb;
            --success-green: #10b981;
            --occupied-red: #ef4444;
            --warning-orange: #ea580c;
            --text-muted: #6b7280;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: start; min-height: 100vh; padding: 20px; }
        
        .web-app-container {
            width: 100%; max-width: 480px; background: #fff; min-height: 85vh;
            border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }
        
        .header { padding: 20px 20px 10px 20px; display: flex; align-items: center; background: #fff; justify-content: space-between; }
        .logo-badge { background-color: #0f172a; color: white; font-weight: 800; padding: 6px 10px; border-radius: 6px; font-size: 14px; margin-right: 12px; }
        .app-title { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: #000; }
        .logout-btn { background: none; border: none; color: var(--occupied-red); font-weight: 700; font-size: 12px; cursor: pointer; text-transform: uppercase; display: none; }

        .nav-tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border-color); }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; font-size: 11px; font-weight: 600; color: var(--text-muted); text-decoration: none; cursor: pointer; text-align: center; }
        .tab-item.active { color: var(--primary-blue); border-bottom: 3px solid var(--primary-blue); background: #f8fafc; }
        .tab-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: none; stroke: currentColor; stroke-width: 2; }

        .page-title-bar { padding: 14px 20px; display: flex; align-items: center; background: #fff; border-bottom: 1px solid var(--border-color); }
        .page-heading { font-size: 16px; font-weight: 700; text-transform: uppercase; }
        
        .content-workspace { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .status-msg { text-align: center; color: var(--text-muted); font-size: 14px; margin-top: 30px; }
        
        .alert-banner { display: none; background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; font-size: 13px; font-weight: 700; padding: 12px; border-radius: 8px; margin-bottom: 14px; text-align: center; line-height: 1.4; }

        /* Rooms Matrix Grid Layout */
        .room-matrix-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .room-block-card { background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 12px; padding: 22px 10px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .room-block-card h3 { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: #000; }
        
        .room-status-badge { font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; display: inline-flex; align-items: center; }
        
        .status-stayback { background: #fee2e2; color: var(--occupied-red); }
        .status-checkout-pending { background: #ffedd5; color: #ea580c; border: 1px dashed #ea580c; }
        .status-prebooked { background: #fef3c7; color: var(--warning-orange); }
        .status-available { background: #e0f2fe; color: var(--primary-blue); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-box { background: white; width: 100%; max-width: 360px; border-radius: 16px; padding: 20px; box-shadow: 0 20px 25px rgba(0,0,0,0.15); }
        .modal-title { font-size: 15px; font-weight: 800; text-transform: uppercase; margin-bottom: 16px; text-align: center; }
        .btn-modal-option { width: 100%; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 14px; text-transform: uppercase; border: 1px solid var(--border-color); background: white; margin-bottom: 10px; cursor: pointer; text-align: center; }
        .btn-modal-option:hover { background: #f3f4f6; border-color: #9ca3af; }
        
        .modal-btn-row { display: flex; gap: 10px; margin-top: 14px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; font-size: 13px; text-align: center; text-transform: uppercase; }
        .btn-m-confirm { background: var(--success-green); color: white; }
        .btn-m-cancel { background: #e5e7eb; color: var(--text-main); }

        .category-button { display: block; width: 100%; margin-bottom: 8px; padding: 12px; font-size: 15px; font-weight: 700; background-color: #3498db; color: white; border: none; cursor: pointer; border-radius: 8px; text-transform: uppercase; }
        .menu-section { display: none; background: #f8fafc; border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
        .menu-section h2 { font-size: 14px; text-transform: uppercase; margin-bottom: 8px; color: var(--text-muted); }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border-color); font-size: 14px; font-weight: 600; background: #fff; border-radius: 6px; margin-bottom: 6px; }
        .quantity-controls { display: flex; align-items: center; }
        .quantity-controls button { padding: 4px 10px; font-size: 16px; font-weight: 800; background-color: #ef4444; color: white; border: none; cursor: pointer; margin: 0 5px; border-radius: 4px; }
        .quantity-controls span { width: 24px; display: inline-block; text-align: center; font-size: 15px; }
        #totalBillSummary { font-size: 18px; font-weight: 800; text-align: right; margin: 14px 0; color: var(--text-main); }
        .btn-submit-main { background-color: var(--success-green); color: white; padding: 14px; border: none; font-size: 15px; font-weight: 700; width: 100%; cursor: pointer; border-radius: 8px; text-transform: uppercase; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; font-weight: 600; background: #fff; }

        /* Auth Verification Styles - Changed default display to none to eliminate page flicker */
        .login-container { padding: 10px 0; display: none; flex-direction: column; justify-content: center; }
        .login-title { font-size: 18px; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; text-align: center; margin-top: 10px; }
        .login-subtitle { font-size: 12px; color: var(--text-muted); text-align: center; margin-bottom: 20px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="web-app-container">
        <header class="header">
            <div class="header-left" style="display:flex; align-items:center;">
                <div class="logo-badge">DR</div>
                <h1 class="app-title">Demo Resort</h1>
            </div>
            <button id="logoutBtn" class="logout-btn" onclick="handleLogoutRequest()">Logout</button>
        </header>

        <nav class="nav-tabs">
            <div class="tab-item" onclick="window.location.href='index.html'">
                <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </div>
            <div class="tab-item active" onclick="window.location.href='addbill.html'">
                <svg viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                Add bill
            </div>
            <div class="tab-item" onclick="window.location.href='pendingorder.html'">
                <svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Pending Orders
            </div>
            <div class="tab-item">
                <svg viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Account
            </div>
        </nav>

        <div class="page-title-bar">
            <h2 class="page-heading" id="viewSectionHeading">Select Target Room</h2>
        </div>

        <div class="content-workspace">
            <div id="workspaceAlertBanner" class="alert-banner"></div>

            <div id="loginSection" class="login-container">
                <h2 class="login-title">Gatekeeper Verification</h2>
                <p class="login-subtitle">Please authenticate to manage billing updates</p>
                
                <label style="font-size:11px; color:var(--text-muted); display:block; margin-bottom:4px; font-weight:700; text-transform:uppercase;">Email Address</label>
                <input type="email" id="loginEmail" class="form-input" style="margin-bottom:12px;" placeholder="e.g., staff@demoresort.com">
                
                <label style="font-size:11px; color:var(--text-muted); display:block; margin-bottom:4px; font-weight:700; text-transform:uppercase;">Password</label>
                <input type="password" id="loginPassword" class="form-input" style="margin-bottom:12px;" placeholder="••••••••">
                
                <button class="btn-submit-main" style="margin-top: 6px;" onclick="handleLoginRequest()">Login & Continue</button>
            </div>

            <div id="billingMainWorkspace" style="display: none; flex-direction: column; width:100%;">
                <div id="roomSelectionWorkspace" class="room-matrix-grid"></div>
                <div id="loadingWorkspaceText" class="status-msg">Scanning resort layout records...</div>

                <div id="foodBillWorkspace" style="display:none;">
                    <button class="category-button" onclick="toggleMenuCategory('beverages')">Beverages</button>
                    <div id="beverages" class="menu-section"><div class="menu-list"></div></div>

                    <button class="category-button" onclick="toggleMenuCategory('breakfast')">Breakfast</button>
                    <div id="breakfast" class="menu-section"><div class="menu-list"></div></div>

                    <button class="category-button" onclick="toggleMenuCategory('lunch')">Lunch</button>
                    <div id="lunch" class="menu-section"><div class="menu-list"></div></div>

                    <button class="category-button" onclick="toggleMenuCategory('dinner')">Dinner</button>
                    <div id="dinner" class="menu-section"><div class="menu-list"></div></div>

                    <div id="totalBillSummary">Total Bill: ₹0</div>
                    <button class="btn-submit-main" onclick="compileFoodBillOrder()">Add Bill</button>
                </div>

                <div id="extraBillWorkspace" style="display:none;">
                    <div class="form-group">
                        <label>Bill Name / Particular Description</label>
                        <input type="text" id="extraBillName" class="form-input" placeholder="e.g., Laundry Service, Extra Bed">
                    </div>
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="extraBillAmount" class="form-input" placeholder="0" min="1" oninput="this.value=this.value.replace(/[^0-9]/g,'');">
                    </div>
                    <button class="btn-submit-main" style="margin-top:10px;" onclick="compileExtraBillOrder()">Add Bill</button>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="workflowSplitModal">
            <div class="modal-box">
                <h3 class="modal-title" id="splitModalTitle">Room Options</h3>
                <button class="btn-modal-option" onclick="routeToBillingSubspace('food')">1. Food Bill</button>
                <button class="btn-modal-option" onclick="routeToBillingSubspace('extra')">2. Extra Bill</button>
                <button class="modal-btn btn-m-cancel" style="width:100%;" onclick="closeModalWindow('workflowSplitModal')">Cancel</button>
            </div>
        </div>

        <div class="modal-overlay" id="orderConfirmationModal">
            <div class="modal-box">
                <h3 class="modal-title">Confirm Bill Details</h3>
                <div id="orderConfirmationSummaryText" style="font-size:13px; line-height:1.6; background:#f8fafc; border:1px solid var(--border-color); padding:12px; border-radius:8px; margin-bottom:12px; max-height:220px; overflow-y:auto; white-space:pre-wrap;"></div>
                <div class="modal-btn-row">
                    <button class="modal-btn btn-m-cancel" onclick="closeModalWindow('orderConfirmationModal')">Cancel</button>
                    <button class="modal-btn btn-m-confirm" onclick="writeBillRecordToDatabase()">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const todayStr = new Date().toLocaleDateString('sv'); 
        const customRoomsList = ["A-1", "Twin-1", "Twin-2", "Paddy", "P-1", "P-2", "Delux"];
        let roomsState = {};

        // -------------------------------------------------------------
        // UNIFIED DATABASE: Room Bookings, Menu & Users (booking-25ba4)
        // -------------------------------------------------------------
        const roomApp = firebase.initializeApp({
            apiKey: "AIzaSyCebk_0DBBu5w0cvWP0lUKqQanmiwoC42U",
            authDomain: "booking-25ba4.firebaseapp.com",
            projectId: "booking-25ba4",
            storageBucket: "booking-25ba4.firebasestorage.app"
        }, "roomAppInstance");
        const roomDb = firebase.firestore(roomApp);
        const auth = firebase.auth(roomApp);

        let selectedRoomNo = null;
        let selectedStayId = null;
        let selectedBookingGroupId = null; // Storing active group ID mapping context
        let selectedBillingType = null;

        let prices = {};
        let quantities = {};
        let idToName = {};
        let singleItemPayload = {};

        // Simplified State Observer: Displays login panel only if authentication context fails
        auth.onAuthStateChanged(user => {
            const loginSection = document.getElementById('loginSection');
            const billingWorkspace = document.getElementById('billingMainWorkspace');
            const logoutBtn = document.getElementById('logoutBtn');
            const loadingText = document.getElementById('loadingWorkspaceText');
            const roomSelection = document.getElementById('roomSelectionWorkspace');
            
            if (user) {
                loginSection.style.display = 'none';
                billingWorkspace.style.display = 'flex';
                roomSelection.style.display = 'grid';
                loadingText.style.display = 'block';
                logoutBtn.style.display = 'block';
                initAppWorkspace();
            } else {
                billingWorkspace.style.display = 'none';
                logoutBtn.style.display = 'none';
                loginSection.style.display = 'flex';
            }
        });

        function handleLoginRequest() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            hideGlobalError();

            if(!email || !password) {
                displayGlobalError("Please fill out all operational authentication inputs.");
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .catch(err => {
                    displayGlobalError("Authentication Failed: " + err.message);
                });
        }

        function handleLogoutRequest() {
            if(confirm("Confirm security exit dashboard session?")) {
                auth.signOut();
            }
        }

        function displayGlobalError(msg) {
            const banner = document.getElementById('workspaceAlertBanner');
            if(banner) {
                banner.innerText = msg;
                banner.style.display = 'block';
            }
        }

        function hideGlobalError() {
            const banner = document.getElementById('workspaceAlertBanner');
            if(banner) banner.style.display = 'none';
        }

        function initAppWorkspace() {
            customRoomsList.forEach(roomName => {
                roomsState[roomName] = { status: 'Loading', data: null, docId: null };
            });
            fetchRoomStatusesParallel();
            fetchFoodMenuItems();
        }

        function fetchRoomStatusesParallel() {
            const roomPromises = customRoomsList.map(roomName => checkSingleRoomStatus(roomName));
            Promise.all(roomPromises).then(() => {
                renderRoomMatrixGrid();
            }).catch(err => console.error("Parallel rooms load failed:", err));
        }

        async function checkSingleRoomStatus(roomName) {
            try {
                let activeSnap = await roomDb.collection('bookings')
                                         .where('roomNo', '==', roomName)
                                         .where('checkedIn', '==', true).get();

                if (activeSnap.empty) {
                    activeSnap = await roomDb.collection('bookings')
                                         .where('roomNo', 'array-contains', roomName)
                                         .where('checkedIn', '==', true).get();
                }

                if (!activeSnap.empty) {
                    let stayData = activeSnap.docs[0].data();
                    let docId = activeSnap.docs[0].id;
                    
                    if (stayData.checkout === todayStr) {
                        roomsState[roomName] = { status: 'CheckoutPending', data: stayData, docId: docId };
                    } else {
                        roomsState[roomName] = { status: 'StayBack', data: stayData, docId: docId };
                    }
                    return; 
                }

                let reservedSnap = await roomDb.collection('bookings')
                                           .where('roomNo', '==', roomName)
                                           .where('checkin', '==', todayStr)
                                           .get();

                if (reservedSnap.empty) {
                    reservedSnap = await roomDb.collection('bookings')
                                           .where('roomNo', 'array-contains', roomName)
                                           .where('checkin', '==', todayStr)
                                           .get();
                }

                let freshReservation = reservedSnap.docs.find(d => d.data().checkedIn !== 'Completed' && d.data().checkedIn !== true);

                if (freshReservation) {
                    roomsState[roomName] = { status: 'Reserved', data: freshReservation.data(), docId: freshReservation.id };
                } else {
                    roomsState[roomName] = { status: 'Available', data: null, docId: null };
                }
            } catch (error) {
                console.error("Error evaluating status for room " + roomName, error);
                roomsState[roomName] = { status: 'Available', data: null, docId: null };
            }
        }

        async function fetchFoodMenuItems() {
            try {
                let menuSnap = await roomDb.collection('menuItems').get();
                let menuItems = [];
                menuSnap.forEach(doc => menuItems.push({ id: doc.id, ...doc.data() }));
                buildFoodMenuLayout(menuItems);
            } catch(err) {
                console.error("Menu items read error layout mismatch: ", err);
            }
        }

        function renderRoomMatrixGrid() {
            const grid = document.getElementById('roomSelectionWorkspace');
            grid.innerHTML = '';
            document.getElementById('loadingWorkspaceText').style.display = 'none';

            customRoomsList.forEach(roomName => {
                const room = roomsState[roomName];
                let badgeClass = 'status-available';
                let displayLabel = 'Available';
                let guestLine = '';

                if (room.status === 'StayBack') {
                    badgeClass = 'status-stayback';
                    displayLabel = 'Stay Back';
                    guestLine = room.data.name ? `<p style="margin-top:10px; font-weight:700; color:#ef4444; font-size:12px;">👤 ${room.data.name}</p>` : '';
                } else if (room.status === 'CheckoutPending') {
                    badgeClass = 'status-checkout-pending';
                    displayLabel = '⚠️ Checkout';
                    guestLine = room.data.name ? `<p style="margin-top:10px; font-weight:700; color:#ea580c; font-size:12px;">👤 ${room.data.name}</p>` : '';
                } else if (room.status === 'Reserved') {
                    badgeClass = 'status-prebooked';
                    displayLabel = 'Pre-Booked';
                }

                grid.innerHTML += `
                    <div class="room-block-card" onclick="handleRoomBlockClick('${roomName}')">
                        <h3>${roomName}</h3>
                        <div style="margin-top: 6px;">
                            <span class="room-status-badge ${badgeClass}">${displayLabel}</span>
                        </div>
                        ${guestLine}
                    </div>
                `;
            });
        }

        function handleRoomBlockClick(roomName) {
            hideGlobalError();
            const room = roomsState[roomName];
            
            if (room.status === 'Available') {
                displayGlobalError("Operational Alert: No active stay in this room right now.");
                return;
            }
            if (room.status === 'Reserved') {
                displayGlobalError("Operational Alert: This room is pre-booked. Billing can begin once checked in.");
                return;
            }

            selectedRoomNo = roomName;
            selectedStayId = room.docId;
            // Capture bookingGroupId falls back to the docId context if the field is missing
            selectedBookingGroupId = (room.data && room.data.bookingGroupId) ? room.data.bookingGroupId : room.docId;

            document.getElementById('splitModalTitle').innerText = `${roomName} Options`;
            document.getElementById('workflowSplitModal').style.display = 'flex';
        }

        function routeToBillingSubspace(billingType) {
            selectedBillingType = billingType;
            closeModalWindow('workflowSplitModal');

            document.getElementById('roomSelectionWorkspace').style.display = 'none';
            document.getElementById('viewSectionHeading').innerText = `${selectedRoomNo} › ${billingType === 'food' ? 'Food Order' : 'Extra Bill'}`;

            if (billingType === 'food') {
                for (let key in quantities) quantities[key] = 0;
                document.querySelectorAll('.menu-item span[id$="-qty"]').forEach(el => el.innerText = '0');
                document.getElementById('totalBillSummary').innerText = "Total Bill: ₹0";
                document.getElementById('foodBillWorkspace').style.display = 'block';
            } else {
                document.getElementById('extraBillName').value = '';
                document.getElementById('extraBillAmount').value = '';
                document.getElementById('extraBillWorkspace').style.display = 'block';
            }
        }

        function buildFoodMenuLayout(menuItems) {
            const categories = ["beverages", "breakfast", "lunch", "dinner"];
            categories.forEach(cat => {
                const listContainer = document.getElementById(cat).querySelector('.menu-list');
                listContainer.innerHTML = "";
                
                let filtered = menuItems.filter(item => Array.isArray(item.categories) && item.categories.includes(cat));
                filtered.forEach(item => {
                    let key = item.id;
                    prices[key] = item.price;
                    idToName[key] = item.name;
                    quantities[key] = 0;

                    listContainer.innerHTML += `
                        <div class="menu-item">
                            <span>${item.name} - ₹${item.price}</span>
                            <div class="quantity-controls">
                                <button onclick="alterFoodQty('${key}', -1)">-</button>
                                <span id="${key}-qty">0</span>
                                <button onclick="alterFoodQty('${key}', 1)">+</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function toggleMenuCategory(catId) {
            let element = document.getElementById(catId);
            let displayState = element.style.display;
            document.querySelectorAll(".menu-section").forEach(sec => sec.style.display = "none");
            element.style.display = (displayState === "block") ? "none" : "block";
        }

        function alterFoodQty(key, delta) {
            if ((quantities[key] + delta) >= 0) {
                quantities[key] += delta;
                document.getElementById(`${key}-qty`).innerText = quantities[key];
                
                let grandTotal = Object.keys(quantities).reduce((sum, k) => sum + (quantities[k] * prices[k]), 0);
                document.getElementById("totalBillSummary").innerText = "Total Bill: ₹" + grandTotal;
            }
        }

        function compileFoodBillOrder() {
            hideGlobalError();
            let listString = "";
            let costVal = 0;

            for (let key in quantities) {
                if (quantities[key] > 0) {
                    let title = idToName[key];
                    listString += `${title} x ${quantities[key]} (₹${prices[key] * quantities[key]})\n`;
                    costVal += quantities[key] * prices[key];
                }
            }

            if (costVal === 0) {
                displayGlobalError("Compilation Alert: Please select at least one item to order.");
                return;
            }

            singleItemPayload = {
                billType: "Food",
                particular: listString.trim(),
                amount: costVal,
                date: new Date().toISOString()
            };

            document.getElementById('orderConfirmationSummaryText').innerText = `ROOM: ${selectedRoomNo}\nCATEGORY: Food Bill\n----------------------\n${listString}\n----------------------\nGRAND TOTAL: ₹${costVal}`;
            document.getElementById('orderConfirmationModal').style.display = 'flex';
        }

        function compileExtraBillOrder() {
            hideGlobalError();
            const txtTitle = document.getElementById('extraBillName').value.trim();
            const numAmt = parseInt(document.getElementById('extraBillAmount').value);

            if (!txtTitle || !numAmt || numAmt <= 0) {
                displayGlobalError("Compilation Alert: Please check that both input fields are correctly filled.");
                return;
            }

            singleItemPayload = {
                billType: "Extra",
                particular: txtTitle,
                amount: numAmt,
                date: new Date().toISOString()
            };

            document.getElementById('orderConfirmationSummaryText').innerText = `ROOM: ${selectedRoomNo}\nCATEGORY: Extra Service\n----------------------\nService: ${txtTitle}\nCharge Amount: ₹${numAmt}\n----------------------\nGRAND TOTAL: ₹${numAmt}`;
            document.getElementById('orderConfirmationModal').style.display = 'flex';
        }

        async function writeBillRecordToDatabase() {
            try {
                // Querying all active documents sharing the same target bookingGroupId
                const matchingBookingsSnap = await roomDb.collection('bookings')
                    .where('bookingGroupId', '==', selectedBookingGroupId)
                    .where('checkedIn', '==', true)
                    .get();

                const batch = roomDb.batch();

                if (!matchingBookingsSnap.empty) {
                    // Injecting items to all matching documents found inside group
                    matchingBookingsSnap.forEach(doc => {
                        batch.update(doc.ref, {
                            extraBills: firebase.firestore.FieldValue.arrayUnion(singleItemPayload)
                        });
                    });
                } else {
                    // Fallback block if bookingGroupId isn't present across documents yet
                    const fallbackRef = roomDb.collection('bookings').doc(selectedStayId);
                    batch.update(fallbackRef, {
                        extraBills: firebase.firestore.FieldValue.arrayUnion(singleItemPayload)
                    });
                }

                await batch.commit();
                window.location.href = 'index.html';
            } catch (err) {
                displayGlobalError("Database Write Error: " + err.message);
            }
        }

        function closeModalWindow(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
    </script>
</body>
</html>
