<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reception - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --primary-blue: #2563eb;
            
            /* Card Colors */
            --color-bookings: #f59e0b;
            --color-rooms: #10b981;
            --color-staff: #3b82f6;
            --color-menu: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: start;
            min-height: 100vh;
            padding: 20px;
        }

        .web-app-container {
            width: 100%;
            max-width: 480px;
            background: #fcfcfd;
            min-height: 85vh;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .header {
            padding: 20px 20px 10px 20px;
            display: flex;
            align-items: center;
            background: #fff;
        }

        .logo-badge {
            background-color: #0f172a;
            color: white;
            font-weight: 800;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 14px;
            letter-spacing: 0.5px;
            margin-right: 12px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #000;
        }

        .nav-tabs {
            display: flex;
            background: #fff;
            border-bottom: 2px solid var(--border-color);
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
        }

        .tab-item svg {
            width: 22px;
            height: 22px;
            margin-bottom: 4px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .tab-item.active {
            color: var(--primary-blue);
            border-bottom: 3px solid var(--primary-blue);
            margin-bottom: -2px;
            background: #f8fafc;
        }

        .main-menu {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            flex: 1;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: 14px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0,0,0,0.04);
        }

        .card-icon-side {
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .card-icon-side svg {
            width: 65px;
            height: 65px;
            color: white;
        }

        .card-info-side {
            flex: 1;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-title {
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #000;
            margin-bottom: 10px;
        }

        .manage-btn {
            background: white;
            border: 1.5px solid #000;
            color: #000;
            padding: 5px 22px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .manage-btn:hover {
            background: #000;
            color: white;
        }

        .bg-bookings { background-color: var(--color-bookings); }
        .bg-rooms { background-color: var(--color-rooms); }
        .bg-staff { background-color: var(--color-staff); }
        .bg-menu { background-color: var(--color-menu); }

        .calendar-container {
            padding: 15px 10px;
            background: #fff;
            border-radius: 12px;
            margin: 10px;
            box-shadow: 0 3px 12px #eee;
        }
        .calendar { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; background: #f1f1f1; padding: 10px; border-radius: 6px; }
        .calendar-day { height: 40px; background: #fff; border: 1px solid #ccc; border-radius: 4px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: 600; }
        .calendar-day.selected { background: #2979ff; color: #fff; border-color: #2979ff; }
        .month-controls { display: flex; justify-content: center; align-items: center; margin-bottom: 14px; }
        .month-btn { background: #2979ff; color: #fff; border: none; border-radius: 7px; padding: 6px 15px; font-size: 14px; margin: 0 9px; font-weight: bold; cursor: pointer; }
        #month-label { font-size: 16px; font-weight: bold; }
        
        #bookings-list { margin-top: 13px; display: flex; flex-direction: column; gap: 10px; }
        .booking-card { background: #eaf8ee; padding: 12px 14px; border-radius: 8px; border: 1px solid #89c6b4; line-height: 1.6; font-size: 14px; }
        
        .empty-room-card { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 12px 14px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: var(--text-main); font-weight: 700; font-size: 14px; }
        .empty-room-card:hover { background: #f1f5f9; border-color: #94a3b8; }
        .past-empty-card { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 12px 14px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; color: #94a3b8; font-weight: 500; font-size: 14px; }
        .plus-badge { background: #2979ff; color: white; border-radius: 6px; padding: 2px 8px; font-size: 14px; font-weight: 800; }
        
        .action-btn { margin-top: 8px; margin-right: 6px; cursor: pointer; padding: 5px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .edit-btn { background: #ffa726; color: #fff; }
        .view-bill-btn { background: #10b981; color: #fff; }
        .delete-btn { background: #ef5350; color: #fff; }
        
        .modal-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); width: 90%; max-width: 360px; }
        .modal input { width: 100%; margin-bottom: 10px; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .modal-btn-row { display: flex; justify-content: flex-end; margin-top: 12px; gap: 8px; }
        .modal-btn-row button { padding: 6px 14px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-weight: 600; }
        .modal-title { margin-bottom: 16px; font-weight: bold; font-size: 18px; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .error { color: #e53935; margin-bottom: 8px; font-size: 13px; }
        
        .settled-bill-box { background: #f8fafc; padding: 12px; border-radius: 8px; font-size: 13.5px; line-height: 1.6; border: 1px solid #e2e8f0; margin-bottom: 12px; }
        .bill-item-row { display: flex; justify-content: space-between; font-size: 12.5px; color: #475569; padding: 2px 0; border-bottom: 1px dashed #cbd5e1; }
    </style>
</head>
<body>

        <div id="appWorkspace" style="flex: 1; overflow-y: auto;">
            
            <main class="main-menu" id="dashboardView">
                <div class="menu-card">
                    <div class="card-icon-side bg-bookings">
                        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5m-9-6h.008v.008H12v-.008zM12 15h.008v.008H12V15zm0 2.25h.008v.008H12v-.008zM9.75 15h.008v.008H9.75V15zm0 2.25h.008v.008H9.75v-.008zM7.5 15h.008v.008H7.5V15zm0 2.25h.008v.008H7.5v-.008zm6.75-4.5h.008v.008h-.008v-.008zm0 2.25h.008v.008h-.008V15zm0 2.25h.008v.008h-.008v-.008zm2.25-4.5h.008v.008H16.5v-.008zm0 2.25h.008v.008H16.5V15z" /></svg>
                    </div>
                    <div class="card-info-side">
                        <div class="card-title">Upcoming Bookings</div>

                <div class="menu-card">
                    <div class="card-icon-side bg-rooms">
                        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 16.5h1.5M13.5 16.5H15" /></svg>

                <h2 style="text-align:center; margin-bottom:11px; font-size: 18px;">Bookings Calendar</h2>

    <div id="loginModal" class="modal-bg" style="display:none;">
        <form class="modal" onsubmit="event.preventDefault();loginWithEmail();">

            <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">

                <button type="submit" class="action-btn edit-btn" style="border:none;">Login</button>
            </div>
        </form>
    </div>

    <div id="editModalBg" class="modal-bg" style="display:none;">
        <form class="modal" id="editModal" onsubmit="event.preventDefault();submitEdit();">
            <div class="modal-title">Edit Booking</div>

            <input type="text" id="editName" placeholder="Name" required>
            <input type="text" id="editPhone" placeholder="Phone" required>
            <input type="text" id="editCheckin" placeholder="Check-in Date" required>

            <input type="text" id="editRoomNo" placeholder="Room No" required>

    <div id="settledBillModalBg" class="modal-bg" style="display:none;">

            <div class="modal-btn-row">
                <button type="button" class="action-btn edit-btn" style="border:none; margin-top:0;" onclick="closeSettledBillModal()">Close Bill</button>
            </div>
        </div>
    </div>

    <div id="deleteModalBg" class="modal-bg" style="display:none;">
        <div class="modal">
            <div class="modal-title">Delete Booking</div>

            <div id="deleteError" class="error"></div>
            <div class="modal-btn-row">
                <button type="button" onclick="closeDeleteModal()">Cancel</button>
                <button type="button" class="action-btn delete-btn" style="border:none; margin-top:0;" onclick="submitDelete()">Delete</button>
            </div>
        </div>
    </div>

    <script>
        // TARGET OWNER ACCOUNT MAIL SPECIFIED BY GUEST
        const OWNER_EMAIL = "demo.booking2026@gmail.com";

        function verifyOwnerSession() {
            const activeUser = auth.currentUser;
            if (activeUser && activeUser.email === OWNER_EMAIL) {
                return true;
            }
            return false;
        }

        function triggerAddRedirect(roomName, targetDate) {
            if (!verifyOwnerSession()) {
                alert("Owner only access this");
                return;
            }
            window.location.href = `new.html?room=${encodeURIComponent(roomName)}&date=${targetDate}`;
        }

        function showDashboardView() {
            document.getElementById('dashboardTab').classList.add('active');
            document.getElementById('dashboardView').style.display = 'flex';
            document.getElementById('calendarContainer').style.display = 'none';
        }

        function showCalendarView() {
            document.getElementById('dashboardTab').classList.remove('active');
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('calendarContainer').style.display = 'block';
            
            if (!selectedDate) {
                selectedDate = new Date().toLocaleDateString('sv');
            }
            renderCalendar();
            showBookingsOnDate(selectedDate);
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCebk_0DBBu5w0cvWP0lUKqQanmiwoC42U",
            authDomain: "booking-25ba4.firebaseapp.com",
            projectId: "booking-25ba4",
            storageBucket: "booking-25ba4.firebasestorage.app",
            messagingSenderId: "924758316703",
            appId: "1:924758316703:web:6cee8188781143ae1774aa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const customRoomsList = ["A-1", "Twin-1", "Twin-2", "Paddy", "P-1", "P-2", "Delux"];

        let calendarMonth = new Date().getMonth();
        let calendarYear = new Date().getFullYear();
        let selectedDate = null;
        let currentEditId = null;
        let currentDeleteId = null;
        let currentDeleteData = null;

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loginModal').style.display = 'none';
                showDashboardView();
            } else {
                document.getElementById('loginModal').style.display = '';
                document.getElementById('dashboardView').style.display = 'none';
                document.getElementById('calendarContainer').style.display = 'none';
            }
        });

        function loginWithEmail(){
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            auth.signInWithEmailAndPassword(email, password)
                .then(() => { document.getElementById('loginError').textContent=''; })
                .catch(e => { document.getElementById('loginError').textContent = e.message; });
        }

        function changeMonth(diff){
            calendarMonth += diff;
            if(calendarMonth < 0){ calendarMonth = 11; calendarYear--; }
            if(calendarMonth > 11){ calendarMonth = 0; calendarYear++; }
            selectedDate = null;
            renderCalendar();
            document.getElementById('bookings-list').innerHTML = '';
        }

        function renderCalendar(){
            const calDiv = document.getElementById('calendar');
            calDiv.innerHTML = '';
            const days = new Date(calendarYear, calendarMonth+1, 0).getDate();
            document.getElementById('month-label').textContent =
                `${calendarYear}-${String(calendarMonth+1).padStart(2,'0')}`;
            for(let d=1; d<=days; d++){
                const dateStr = `${calendarYear}-${String(calendarMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const el = document.createElement('div');
                el.className = 'calendar-day'+(selectedDate===dateStr?' selected':'');
                el.textContent = d;
                el.onclick = function(){
                    selectedDate = dateStr;
                    renderCalendar();
                    showBookingsOnDate(dateStr);
                }
                calDiv.appendChild(el);
            }
        }

        function showBookingsOnDate(dateStr) {
            const todayStr = new Date().toLocaleDateString('sv');
            const isPastDate = dateStr < todayStr;

            db.collection('bookings')
                .where('checkin', '==', dateStr)
                .get()
                .then(snapshot => {
                    const listDiv = document.getElementById('bookings-list');
                    listDiv.innerHTML = '';
                    
                    let roomBookingsMap = {};
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if (data.roomNo) {
                            roomBookingsMap[data.roomNo] = { id: doc.id, ...data };
                        }
                    });

                    customRoomsList.forEach(roomName => {
                        if (roomBookingsMap[roomName]) {
                            const data = roomBookingsMap[roomName];
                            const isSettled = data.checkedIn === "Completed";
                            
                            let actionButtonsHTML = "";
                            
                            if (isSettled) {
                                actionButtonsHTML = `<button class="action-btn view-bill-btn" onclick="openSettledBillMiniWindow('${data.id}')">View Bill</button>`;
                            } else if (isPastDate) {
                                actionButtonsHTML = `<button class="action-btn view-bill-btn" style="background:#34495e;" onclick="window.location.href='room_details.html'">View Runtime Details</button>`;
                            } else {
                                actionButtonsHTML = `
                                    <button class="action-btn edit-btn" onclick="openEditModal('${data.id}')">Edit</button>
                                    <button class="action-btn delete-btn" onclick="openDeleteModal('${data.id}')">Delete</button>
                                `;
                            }

                            listDiv.innerHTML += `
                                <div class="booking-card" style="${isSettled ? 'background:#f0fdf4; border-color:#bbf7d0;' : ''}">
                                     <div style="font-size:15px; font-weight:800; color:#1e293b; margin-bottom:4px; text-transform:uppercase; display:flex; justify-content:space-between;">
                                         <span>Room: ${roomName}</span>
                                         ${isSettled ? '<span style="color:#166534; font-size:11px; background:#dcfce7; padding:2px 8px; border-radius:12px;">✅ SETTLED</span>' : ''}
                                     </div>
                                     <b>Guest Name:</b> ${data.name}<br>
                                     <b>Check-in:</b> ${data.checkin}<br>
                                     <b>Check-out:</b> ${data.checkout}<br>
                                     <b>Total Rent:</b> ₹${data.total}<br>
                                     <b>Advance Paid:</b> ₹${data.advance}<br>
                                     <b>Phone:</b> ${data.phone}<br>
                                     <span style="font-size:11px; font-weight:700; color:#475569; background:#cbd5e1; padding:2px 6px; border-radius:4px; display:inline-block; margin-top:4px;">
                                         Created By: ${data.createdBy || 'owner'}
                                     </span>
                                     <div>
                                         ${actionButtonsHTML}
                                     </div>
                                </div>`;
                        } else {
                            if (isPastDate) {
                                listDiv.innerHTML += `
                                    <div class="past-empty-card">
                                        <span>Room ${roomName}</span>
                                        <span style="font-size: 12px; font-style: italic; color:#94a3b8;">No Booking Recorded</span>
                                    </div>`;
                            } else {
                                listDiv.innerHTML += `
                                    <a href="#" onclick="event.preventDefault(); triggerAddRedirect('${roomName}', '${dateStr}')" class="empty-room-card">
                                        <span>Room ${roomName}</span>
                                        <span class="plus-badge">+ Add Booking</span>
                                    </a>`;
                            }
                        }
                    });
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('bookings-list').innerHTML =
                        `<div style="color:red;text-align:center;margin:17px 0;">Error loading workspace data.</div>`;
                });
        }

        function openSettledBillMiniWindow(docId) {
            db.collection('bookings').doc(docId).get().then(doc => {
                if(!doc.exists) return;
                const data = doc.data();
                
                document.getElementById('settledBillTitle').innerText = `Room Invoice (${data.roomNo})`;
                
                let additionalChargesTotal = 0;
                let additionalBillsHTML = "";
                
                if (data.extraBills && Array.isArray(data.extraBills)) {
                    data.extraBills.forEach(bill => {
                        additionalChargesTotal += parseFloat(bill.amount) || 0;
                        let inlineDesc = bill.particular.replace(/\n/g, ", ");
                        additionalBillsHTML += `
                            <div class="bill-item-row">
                                <span>📌 ${bill.billType}: ${inlineDesc}</span>
                                <b>₹${bill.amount}</b>
                            </div>`;
                    });
                }

                let baseRoomRent = parseFloat(data.total) || 0;
                let advancePaid = parseFloat(data.advance) || 0;
                
                let billWindowHTML = `
                    <b>Guest Name:</b> ${data.name}<br>
                    <b>Phone:</b> ${data.phone}<br>
                    <b>Stay Range:</b> ${data.checkin} to ${data.checkout}<br>
                    <hr style="margin: 8px 0; border:0; border-top: 1px solid #eee;">
                    <b>Base Room Rent:</b> ₹${baseRoomRent}<br>
                    <b>Advance Provided:</b> ₹${advancePaid}<br>
                    
                    ${additionalChargesTotal > 0 ? `
                        <hr style="margin: 8px 0; border:0; border-top:1px solid #eee;">
                        <div style="font-weight:700; color:#2563eb; margin-bottom: 2px;">Extra Point-of-Sale Items:</div>
                        ${additionalBillsHTML}
                    ` : ''}
                    
                    <hr style="margin: 8px 0; border:0; border-top: 1px solid #eee;">
                    <div style="font-size:14px; font-weight:800; color:#166534; display:flex; justify-content:space-between;">
                        <span>Final Balance Owed:</span>
                        <span>₹0 (Paid & Closed)</span>
                    </div>
                    <div style="margin-top:4px; font-size:11px; color:#6b7280; font-weight:700; text-transform:uppercase;">
                        💳 Mode: ${data.paymentMode || 'Settled'}
                    </div>
                `;
                
                document.getElementById('settledBillContent').innerHTML = billWindowHTML;
                document.getElementById('settledBillModalBg').style.display = 'flex';
            }).catch(err => alert("Error accessing ledger log: " + err.message));
        }

        function closeSettledBillModal() {
            document.getElementById('settledBillModalBg').style.display = 'none';
        }

        function openEditModal(docId){
            if (!verifyOwnerSession()) {
                alert("Owner only access this");
                return;
            }
            currentEditId = docId;
            db.collection('bookings').doc(docId).get().then(doc=>{
                const data = doc.data();
                document.getElementById('editName').value = data.name || '';
                document.getElementById('editPhone').value = data.phone || '';
                document.getElementById('editCheckin').value = data.checkin || '';
                document.getElementById('editCheckout').value = data.checkout || '';
                document.getElementById('editRoomNo').value = data.roomNo || '';
                document.getElementById('editTotal').value = data.total || '';
                document.getElementById('editAdvance').value = data.advance || '';
                document.getElementById('editError').textContent = '';
                document.getElementById('editModalBg').style.display = '';
            });
        }
        function closeEditModal(){
            document.getElementById('editModalBg').style.display='none';
            currentEditId = null;
        }
        function submitEdit(){
            document.getElementById('editError').textContent = '';
            db.collection('bookings').doc(currentEditId).update({
                name: document.getElementById('editName').value.trim(),
                phone: document.getElementById('editPhone').value.trim(),
                checkin: document.getElementById('editCheckin').value.trim(),
                checkout: document.getElementById('editCheckout').value.trim(),
                roomNo: document.getElementById('editRoomNo').value.trim(),
                total: parseFloat(document.getElementById('editTotal').value.trim()),
                advance: parseFloat(document.getElementById('editAdvance').value.trim())
            }).then(() => {
                closeEditModal();
                if(selectedDate) showBookingsOnDate(selectedDate);
            }).catch(e=>{ document.getElementById('editError').textContent=e.message; });
        }

        function openDeleteModal(docId){
            if (!verifyOwnerSession()) {
                alert("Owner only access this");
                return;
            }
            currentDeleteId = docId;
            db.collection('bookings').doc(docId).get().then(doc=>{
                currentDeleteData = doc.data();
                document.getElementById('deleteText').innerHTML =
                    `<b>Name:</b> ${currentDeleteData.name}<br>
                     <b>Room:</b> ${currentDeleteData.roomNo}<br>
                     <b>Check-in:</b> ${currentDeleteData.checkin}<br>
                     <b>Check-out:</b> ${currentDeleteData.checkout}<br>
                     <b>Phone:</b> ${currentDeleteData.phone}`;
                document.getElementById('deleteError').textContent = '';
                document.getElementById('deleteModalBg').style.display = '';
            });
        }
        function closeDeleteModal(){
            document.getElementById('deleteModalBg').style.display='none';
            currentDeleteId = null; currentDeleteData = null;
        }
        function submitDelete(){
            db.collection('bookings').doc(currentDeleteId).delete().then(()=>{
                closeDeleteModal();
                if(selectedDate) showBookingsOnDate(selectedDate);
            }).catch(e=>{ document.getElementById('deleteError').textContent=e.message; });
        }
    </script>
</body>
</html>
